<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
      input:focus {
       box-shadow: none !important;
      }
      .input-group {
         background: white;
         
      }

      .dropdown-submenu {
  position: relative;
}

.dropdown-submenu .dropdown-menu {
  top: 0;
  left: 100%;
  margin-top: -1px;
  display: none;
}

.dropdown-submenu:hover .dropdown-menu {
  display: block;
}
</style>
  </head>
  <body>
  
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      
      <div class="input-group shadow rounded-pill overflow-hidden">
        <span class="input-group-text bg-white border-0">
          <i class="fas fa-search"></i>
        </span>
        <input 
          type="text" 
          id="searchInput" 
          class="form-control border-0" 
          placeholder="Search project name..."
        >
        <!-- <button class="btn bg-primary rounded-pill" onclick="searchProject()">Search</button> -->

      </div>
       </div>

      
    <div class="col-md-4">    
  <div class="dropdown">
    <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
      Filter By...
    </button>

    <ul class="dropdown-menu">

      <!-- Priority with submenu -->
      <li class="dropdown-submenu">
        <a class="dropdown-item dropdown-toggle" href="#">Priority</a>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#" onclick="filterBy('priority','High')">High</a></li>
          <li><a class="dropdown-item" href="#" onclick="filterBy('priority','Medium')">Medium</a></li>
          <li><a class="dropdown-item" href="#" onclick="filterBy('priority','Low')">Low</a></li>
        </ul>
      </li>

      <!-- Status with submenu -->
      <li class="dropdown-submenu">
        <a class="dropdown-item dropdown-toggle" href="#">Status</a>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#" onclick="filterBy('status','Completed')">Completed</a></li>
          <li><a class="dropdown-item" href="#" onclick="filterBy('status','Pending')">Pending</a></li>
        </ul>
      </li>

      <li><hr class="dropdown-divider"></li>
      <li><a class="dropdown-item" href="#" onclick="resetFilter()">Show All</a></li>

    </ul>
  </div>
</div>
        

   
  </div>
</div>

    <h1>Project Details</h1>

    <table class="table">
        <div class="container bg-light " style="overflow: scroll;">
        <thead>
            <tr>
                <th scope="col">Id</th>
                <th scope="col">Project Name</th>
                <th scope="col">Priority</th>
                <th scope="col">Department</th>
                <th scope="col">Status</th>
                <th scope="col">Start Date</th>
                <th scope="col">End Date</th>


            </tr>
            </div>
        </thead>

        <tbody id="renderInput">


        </tbody>
    </table>



    <script src="./script.js"> </script>



   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
